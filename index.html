<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Client</title>
  <style>
    :root {
      --bg-a: #f5f7fb;
      --bg-b: #e9eff8;
      --card: #ffffff;
      --text: #172033;
      --muted: #5c6b86;
      --primary: #0f62fe;
      --primary-hover: #0b53d7;
      --border: #d5deef;
      --shadow: 0 20px 50px rgba(23, 32, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #ffffff 0%, var(--bg-a) 35%, var(--bg-b) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 1.35rem;
      letter-spacing: 0.2px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    #question {
      flex: 1;
      font-size: 1rem;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    #question:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 98, 254, 0.15);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 0 18px;
      font-size: 0.96rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      transition: background 120ms ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #answer {
      margin-top: 14px;
      min-height: 64px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px dashed var(--border);
      color: var(--muted);
      background: #fbfcff;
      white-space: pre-wrap;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Ask a Question</h1>
    <div class="stack">
      <div class="row">
        <input id="question" type="text" placeholder="Type your question..." />
        <button id="send" type="button">Send</button>
      </div>
    </div>
    <div id="answer">Your answer will appear here.</div>
  </main>

  <script>
    const HISTORY_WINDOW = 4;
    const chatHistory = [];

    const questionInput = document.getElementById("question");
    const sendButton = document.getElementById("send");
    const answerBox = document.getElementById("answer");

    async function askQuestion() {
      const question = questionInput.value.trim();
      if (!question) return;

      sendButton.disabled = true;
      answerBox.textContent = "";

      try {
        const response = await fetch("http://localhost:8080/question", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question,
            history: chatHistory.slice(-HISTORY_WINDOW),
            history_window: HISTORY_WINDOW
          })
        });

        if (!response.ok) {
          const errorBody = await response.text();
          throw new Error(errorBody || `Request failed (${response.status})`);
        }

        const data = await response.json();
        answerBox.textContent = typeof data.answer === "string" ? data.answer : "";
        if (!answerBox.textContent.trim()) {
          answerBox.textContent = "(empty response)";
        }

        chatHistory.push({ role: "user", content: question });
        chatHistory.push({ role: "assistant", content: answerBox.textContent });
        if (chatHistory.length > HISTORY_WINDOW * 8) {
          chatHistory.splice(0, chatHistory.length - HISTORY_WINDOW * 8);
        }
      } catch (error) {
        answerBox.textContent = `Error: ${error.message}`;
      } finally {
        sendButton.disabled = false;
      }
    }

    sendButton.addEventListener("click", askQuestion);
    questionInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") askQuestion();
    });
  </script>
</body>
</html>
